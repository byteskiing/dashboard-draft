{{#if hasAlerts}}<div style="display:flex;align-items:center;gap:8px;padding:0 16px;border-left:4px solid {{levelColor}};background:{{levelBg}};height:100%;box-sizing:border-box;overflow:hidden;"><span style="font-size:15px;flex-shrink:0;color:{{levelColor}};">⚠</span>{{#if criticalCount}}<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;background:#DC2626;color:#fff;font-size:11px;font-weight:600;flex-shrink:0;white-space:nowrap;">{{criticalCount}} 紧急</span>{{/if}}{{#if warningCount}}<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;background:#D97706;color:#fff;font-size:11px;font-weight:600;flex-shrink:0;white-space:nowrap;">{{warningCount}} 警告</span>{{/if}}<span style="color:#374151;font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{alertText}}</span></div>{{else}}<div style="display:flex;align-items:center;gap:8px;padding:0 16px;border-left:4px solid #10B981;background:#ECFDF5;height:100%;box-sizing:border-box;"><span style="font-size:15px;color:#10B981;flex-shrink:0;">✓</span><span style="color:#374151;font-size:13px;">系统运行正常 — 无异常报警</span></div>{{/if}}
