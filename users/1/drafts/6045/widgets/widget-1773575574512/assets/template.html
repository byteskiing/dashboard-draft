{{#if hasAlerts}}<div class="alert-banner" style="--alert-color:{{levelColor}};--alert-bg:{{levelBg}};"><span class="alert-banner__icon">⚠</span>{{#if criticalCount}}<span class="alert-banner__badge alert-banner__badge--critical">{{criticalCount}} 紧急</span>{{/if}}{{#if warningCount}}<span class="alert-banner__badge alert-banner__badge--warning">{{warningCount}} 警告</span>{{/if}}<span class="alert-banner__text">{{alertText}}</span></div>{{else}}<div class="alert-banner alert-banner--ok"><span class="alert-banner__icon alert-banner__icon--ok">✓</span><span class="alert-banner__text">系统运行正常 - 无异常报警</span></div>{{/if}}
